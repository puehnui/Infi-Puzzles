<!DOCTYPE html>
<html>
<head>
  <title>My Simple Site</title>
  <style>
    .answer {
      display: none;
      margin-top: 10px;
      color: green;
    }
    img {
      width: 200px;
      display: block;
    }
  </style>
</head>
<body>

<h1>Guess the Answer</h1>

<div>
  <img src="https://via.placeholder.com/200" alt="Question 1">
  <button onclick="toggleAnswer('a1')">Show Answer</button>
  <div id="a1" class="answer">This is answer #1</div>
</div>

<br>

<div>
  <img src="https://via.placeholder.com/200" alt="Question 2">
  <button onclick="toggleAnswer('a2')">Show Answer</button>
  <div id="a2" class="answer">This is answer #2</div>
</div>

<script>
function toggleAnswer(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}
</script>

</body>
</html>
